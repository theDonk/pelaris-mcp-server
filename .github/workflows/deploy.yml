name: Deploy MCP Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: wayfinder-ai-fitness
      REGION: australia-southeast1
      SERVICE_NAME: pelaris-firebase-mcp

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Type check before deploying
      - run: npx tsc --noEmit

      # Deploy to Cloud Run (--source uses Dockerfile, preserves existing env/secrets)
      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --source . \
            --project $PROJECT_ID \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --quiet

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME \
            --project $PROJECT_ID \
            --region $REGION \
            --format 'value(status.url)')
          echo "Service URL: $URL"
          HTTP_STATUS=$(curl -s -o /tmp/health.json -w "%{http_code}" "$URL/health")
          echo "Health check: $HTTP_STATUS"
          cat /tmp/health.json
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Health check failed with status $HTTP_STATUS"
            exit 1
          fi
